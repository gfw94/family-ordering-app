services:
  family-ordering:
    image: python:3.12-slim
    container_name: family-ordering
    restart: unless-stopped
    working_dir: /workspace/app
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace/app
      - ./data:/workspace/data
    command: >
      sh -lc "mkdir -p /workspace/data && python /workspace/app/backend/server.py --host 0.0.0.0 --port 8000 --db /workspace/data/main.db"